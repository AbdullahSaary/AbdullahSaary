<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>اترك تهنئتك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #4d3827; --gold: #b48a4a; --gold-light: #e9d7b6; --cream: #fffaf1; --blush: #f7eee2; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--cream); color: var(--ink); font-family: Tajawal, sans-serif; }
    .guestbook { max-width: 1120px; margin: auto; padding: 72px 20px; text-align: center; }
    .eyebrow { color: var(--gold); font-size: .85rem; letter-spacing: .14em; }
    h1 { margin: 10px 0 8px; font: 700 clamp(2rem, 5vw, 3.5rem)/1.25 Amiri, serif; }
    .intro { margin: 0 auto 32px; max-width: 560px; color: #765e4a; }
    .message-form { max-width: 720px; margin: auto; padding: 24px; background: #fffdf9; border: 1px solid var(--gold-light); border-radius: 20px; box-shadow: 0 12px 36px #805d2b12; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { display: block; text-align: right; font-size: .9rem; font-weight: 700; }
    input, textarea { width: 100%; margin-top: 6px; padding: 12px 14px; border: 1px solid #dfc9a8; border-radius: 10px; background: #fffdf9; color: var(--ink); font: inherit; outline-color: var(--gold); }
    textarea { min-height: 120px; resize: vertical; }
    .wide { grid-column: 1 / -1; }
    button { min-width: 180px; margin-top: 20px; padding: 12px 22px; border: 0; border-radius: 999px; background: var(--gold); color: white; font: 700 1rem Tajawal, sans-serif; cursor: pointer; transition: transform .2s, opacity .2s; }
    button:hover { transform: translateY(-2px); } button:disabled { cursor: wait; opacity: .68; transform: none; }
    .form-notice { min-height: 26px; margin: 13px 0 0; color: #6c5039; }
    .form-notice.success { animation: pop .45s ease both; color: #8a672f; font-weight: 700; }
    .wall-heading { margin: 58px 0 20px; font: 700 2rem Amiri, serif; }
    .wall-status { margin: 0 0 20px; color: #846b54; }
    .wall-status.error { color: #a44a3f; }
    .message-wall { column-count: 3; column-gap: 18px; text-align: right; }
    .message-card { break-inside: avoid; display: inline-block; width: 100%; margin: 0 0 18px; padding: 22px; background: #fffdf9; border: 1px solid var(--gold-light); border-radius: 16px; box-shadow: 0 8px 24px #805d2b0d; opacity: 0; animation: fade-up .55s ease forwards; }
    .card-top { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
    .sender { margin: 0; font: 700 1.5rem Amiri, serif; color: #70502c; }
    .relationship { display: inline-block; padding: 4px 9px; border-radius: 999px; background: var(--blush); color: #8a672f; font-size: .78rem; white-space: nowrap; }
    .message-card blockquote { margin: 15px 0; font-size: 1rem; line-height: 1.85; }
    time { color: #9a826c; font-size: .78rem; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(13px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 50% { transform: scale(1.035); } }
    @media (max-width: 800px) { .message-wall { column-count: 2; } }
    @media (max-width: 520px) { .guestbook { padding: 52px 15px; } .fields { grid-template-columns: 1fr; } .wide { grid-column: auto; } .message-wall { column-count: 1; } }
  </style>
</head>
<body>
  <section class="guestbook" aria-labelledby="guestbook-title">
    <span class="eyebrow">بِكلماتكم تكتمل فرحتنا</span>
    <h1 id="guestbook-title">اترك تهنئتك</h1>
    <p class="intro">شاركنا دعاءً طيبًا أو كلمةً من القلب في بداية رحلتنا الجديدة.</p>

    <form id="message-form" class="message-form">
      <div class="fields">
        <label>الاسم<input id="name" name="name" required maxlength="80" autocomplete="name" /></label>
        <label>صلة القرابة / العلاقة<input id="relationship" name="relationship" required maxlength="80" placeholder="مثال: صديق العريس" /></label>
        <label class="wide">التهنئة<textarea id="message" name="message" required maxlength="700"></textarea></label>
      </div>
      <button id="submit-button" type="submit">إرسال التهنئة</button>
      <p id="form-notice" class="form-notice" role="status" aria-live="polite"></p>
    </form>

    <h2 class="wall-heading">المباركات</h2>
    <p id="wall-status" class="wall-status" role="status" aria-live="polite">جاري تحميل المباركات...</p>
    <div id="message-wall" class="message-wall" aria-live="polite"></div>
  </section>

  <script>
    // ألصق هنا رابط نشر Google Apps Script بعد اختيار "Web app" في صفحة النشر.
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDFGwtPfrH51biHIoV15jDnZdlHDaBvzbJjLlM1y5zC4tIg2peS79ETwDKrp92JTKo/exec';
    const form = document.querySelector('#message-form');
    const button = document.querySelector('#submit-button');
    const notice = document.querySelector('#form-notice');
    const wall = document.querySelector('#message-wall');
    const wallStatus = document.querySelector('#wall-status');

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = value || '';
      return element.innerHTML;
    }
    function formatDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : new Intl.DateTimeFormat('ar-EG', { dateStyle: 'medium', timeStyle: 'short' }).format(date);
    }
    function createCard(entry, prepend = false) {
      const card = document.createElement('article');
      card.className = 'message-card';
      card.innerHTML = `<div class="card-top"><h3 class="sender">${escapeHtml(entry.name)}</h3><span class="relationship">${escapeHtml(entry.relationship)}</span></div><blockquote>${escapeHtml(entry.message).replace(/\n/g, '<br>')}</blockquote><time datetime="${escapeHtml(entry.timestamp)}">${formatDate(entry.timestamp)}</time>`;
      if (prepend) wall.prepend(card); else wall.append(card);
    }
    async function loadMessages() {
      if (APPS_SCRIPT_URL.startsWith('PASTE_')) { wallStatus.textContent = 'https://script.google.com/macros/s/AKfycbzDFGwtPfrH51biHIoV15jDnZdlHDaBvzbJjLlM1y5zC4tIg2peS79ETwDKrp92JTKo/exec'; return; }
      try {
        const response = await fetch(APPS_SCRIPT_URL, { method: 'GET', cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load messages');
        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'Unable to load messages');
        const messages = Array.isArray(result.messages) ? result.messages : [];
        messages.forEach(createCard);
        wallStatus.textContent = messages.length ? '' : 'كونوا أول من يترك تهنئة جميلة.';
      } catch (error) {
        wallStatus.textContent = 'تعذّر تحميل المباركات حاليًا. نرجو المحاولة لاحقًا.';
        wallStatus.classList.add('error');
      }
    }
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (APPS_SCRIPT_URL.startsWith('PASTE_')) { notice.textContent = 'https://script.google.com/macros/s/AKfycbzDFGwtPfrH51biHIoV15jDnZdlHDaBvzbJjLlM1y5zC4tIg2peS79ETwDKrp92JTKo/exec'; return; }
      const entry = { name: form.name.value.trim(), relationship: form.relationship.value.trim(), message: form.message.value.trim(), timestamp: new Date().toISOString() };
      button.disabled = true; button.textContent = 'جاري الإرسال...'; notice.textContent = '';
      try {
        const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(entry) });
        const result = await response.json();
        if (!response.ok || !result.success) throw new Error(result.error || 'Unable to submit message');
        createCard(result.message || entry, true);
        wallStatus.textContent = '';
        form.reset(); notice.textContent = '✦ شكرًا لتهنئتك الجميلة، أسعدت قلوبنا!'; notice.className = 'form-notice success';
      } catch (error) {
        notice.textContent = 'تعذّر إرسال التهنئة الآن. يرجى المحاولة لاحقًا.'; notice.className = 'form-notice';
      } finally { button.disabled = false; button.textContent = 'إرسال التهنئة'; }
    });
    loadMessages();
  </script>
</body>
</html>
